name: Validate Evidence Skill

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate published example and links
        run: python scripts/validate_evidence.py references/example-learningplusplus-ledger.json --strict-resume --check-public-links

      - name: Run validation tests
        run: python -m unittest discover -s tests -v
